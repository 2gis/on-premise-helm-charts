{{- if .Values.segmentDetector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "search-api-v8.fullname" . }}-segment-detector
  labels:
    {{- include "search-api-v8.labels" . | nindent 4 }}
    search/part: segment-detector
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: grpc
      protocol: TCP
      port: {{ .Values.service.segmentDetector.port }}
      targetPort: {{ .Values.segmentDetector.ports.grpc }}
  selector:
{{- include "search-api-v8.selectorLabels" . | nindent 4 }}
    search/part: segment-detector
{{ end }}{{- /* .Values.segmentDetector.enabled */}}
